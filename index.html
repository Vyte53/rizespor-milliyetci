<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rizespor Duvar Kağıdı Tasarımcısı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; font-size: 24px; color: #00aa4f; }
        p { color: #aaa; margin-top: 0; font-size: 14px; }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 100%;
        }

        /* Önizleme Alanı - Telefon Ekranı Oranı (9:16) */
        #preview-wrapper {
            position: relative;
            width: 360px;
            height: 640px;
            border: 3px solid #333;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            background-color: #1d2363; /* Varsayılan Arka Plan */
        }

        /* SVG Katmanları */
        .svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #logo-layer {
            object-fit: contain;
            width: 85%;
            height: auto;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Kontrol Paneli */
        .controls {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 340px;
            box-sizing: border-box;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        label { font-weight: 500; font-size: 15px; }
        input[type="color"] {
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }
        
        .btn-download {
            width: 100%;
            background: #00aa4f;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-download:hover { background: #00883f; }
        
        /* Gizli Canvas (İndirme işlemi için) */
        #download-canvas { display: none; }
    </style>
</head>
<body>

    <h1>Rizespor Duvar Kağıdı Tasarımcısı</h1>
    <p>Renkleri seç ve kendi duvar kağıdını yüksek kalitede indir!</p>
    
    <div class="container">
        <div id="preview-wrapper">
            <object id="bg-layer" class="svg-layer" data="motif.svg" type="image/svg+xml"></object>
            <object id="logo-layer" class="svg-layer" data="logo-merkez.svg" type="image/svg+xml"></object>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Arka Plan Rengi</label>
                <input type="color" id="bgColor" value="#1d2363">
            </div>
            <div class="control-group">
                <label>Motif & Logo Rengi</label>
                <input type="color" id="fgColor" value="#ffffff">
            </div>
            <button class="btn-download" id="downloadBtn">Telefon Duvar Kağıdı Yap (PNG)</button>
        </div>
    </div>

    <canvas id="download-canvas" width="1080" height="1920"></canvas>

    <script>
        const bgColorInput = document.getElementById('bgColor');
        const fgColorInput = document.getElementById('fgColor');
        const previewWrapper = document.getElementById('preview-wrapper');
        const bgLayer = document.getElementById('bg-layer');
        const logoLayer = document.getElementById('logo-layer');

        // SVG elemanlarının rengini zorla güncelleyen fonksiyon
        function applyColorToSvg(svgDoc, color) {
            if (!svgDoc) return;
            // SVG içindeki tüm çizim elementlerini seç (path, g, polygon vb.)
            const elements = svgDoc.querySelectorAll('path, polygon, circle, rect, ellipse, line, polyline, g');
            elements.forEach(el => {
                // Eğer elemanın kendisinde veya grubunda dolgu rengi varsa ezmek için:
                el.style.fill = color;
                el.setAttribute('fill', color);
                
                // Eğer çizgi (stroke) bazlı bir çizimse onun rengini de değiştir
                if (el.getAttribute('stroke') && el.getAttribute('stroke') !== 'none') {
                    el.style.stroke = color;
                    el.setAttribute('stroke', color);
                }
            });
        }

        function updateColors() {
            const bgRengi = bgColorInput.value;
            const fgRengi = fgColorInput.value;

            // Ana arka plan rengini değiştir
            previewWrapper.style.backgroundColor = bgRengi;

            // Arka plandaki Türk motifinin rengini değiştir
            try {
                const bgSvgDoc = bgLayer.getSVGDocument();
                applyColorToSvg(bgSvgDoc, fgRengi);
            } catch(e) { console.log("Motif SVG erişim hatası:", e); }

            // Merkez logonun rengini değiştir
            try {
                const logoSvgDoc = logoLayer.getSVGDocument();
                applyColorToSvg(logoSvgDoc, fgRengi);
            } catch(e) { console.log("Logo SVG erişim hatası:", e); }
        }

        // Renk kutuları değiştikçe tetikle
        bgColorInput.addEventListener('input', updateColors);
        fgColorInput.addEventListener('input', updateColors);
        
        // SVG'ler yüklenir yüklenmez ilk renkleri uygula
        bgLayer.addEventListener('load', updateColors);
        logoLayer.addEventListener('load', updateColors);

        // İNDİRME BUTONU FONKSİYONU (Yüksek Çözünürlük 1080x1920)
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const canvas = document.getElementById('download-canvas');
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = bgColorInput.value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const bgSvgString = new XMLSerializer().serializeToString(bgLayer.getSVGDocument().rootElement);
            const logoSvgString = new XMLSerializer().serializeToString(logoLayer.getSVGDocument().rootElement);

            const bgImg = new Image();
            const logoImg = new Image();

            bgImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(bgSvgString);
            bgImg.onload = function() {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                
                logoImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(logoSvgString);
                logoImg.onload = function() {
                    const logoGenislik = canvas.width * 0.85;
                    const logoYukseklik = (logoImg.height / logoImg.width) * logoGenislik;
                    const x = (canvas.width - logoGenislik) / 2;
                    const y = (canvas.height - logoYukseklik) / 2;
                    
                    ctx.drawImage(logoImg, x, y, logoGenislik, logoYukseklik);

                    const link = document.createElement('a');
                    link.download = 'rizaspor-duvarkagidi.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                };
            };
        });
    </script>
</body>
</html>
