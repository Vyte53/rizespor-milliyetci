<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rizespor Duvar Kağıdı Tasarımcısı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; font-size: 24px; color: #00aa4f; }
        p { color: #aaa; margin-top: 0; font-size: 14px; }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 100%;
        }

        /* Önizleme Alanı */
        #preview-wrapper {
            position: relative;
            width: 360px;
            height: 640px;
            border: 3px solid #333;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            background-color: #1d2363;
        }

        .layer-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

/* Motif artık en altta (z-index: 1) */
        #bg-layer {
            z-index: 1;
            opacity: 0.65;
            object-fit: cover;
        }

        /* Logo artık onun üzerinde (z-index: 2) */
        #logo-layer {
            z-index: 2;
            object-fit: contain;
            width: 85%;
            height: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Kontrol Paneli */
        .controls {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 340px;
            box-sizing: border-box;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        label { font-weight: 500; font-size: 15px; }
        input[type="color"] {
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }
        
        .btn-download {
            width: 100%;
            background: #00aa4f;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-download:hover { background: #00883f; }
        
        /* Arka Plandaki Gizli Tuval (Artık Tam 2160x3840) */
        #download-canvas { display: none; }
    </style>
</head>
<body>

    <h1>Rizespor Duvar Kağıdı Tasarımcısı</h1>
    <p>Renkleri seç ve kendi duvar kağıdını 4K UHD kalitede indir!</p>
    
    <div class="container">
        <div id="preview-wrapper">
            <object id="logo-layer" class="layer-item" data="logo-merkez.svg" type="image/svg+xml"></object>
            <object id="bg-layer" class="layer-item" data="motif.svg" type="image/svg+xml"></object>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Arka Plan Rengi</label>
                <input type="color" id="bgColor" value="#1d2363">
            </div>
            <div class="control-group">
                <label>Motif Rengi</label>
                <input type="color" id="motifColor" value="#00aa4f">
            </div>
            <div class="control-group">
                <label>Logo Rengi</label>
                <input type="color" id="fgColor" value="#ffffff">
            </div>
            <button class="btn-download" id="downloadBtn">4K Duvar Kağıdı İndir (UHD)</button>
        </div>
    </div>

    <canvas id="download-canvas" width="2160" height="3840"></canvas>

    <script>
        const bgColorInput = document.getElementById('bgColor');
        const motifColorInput = document.getElementById('motifColor');
        const fgColorInput = document.getElementById('fgColor');
        const previewWrapper = document.getElementById('preview-wrapper');
        const bgLayer = document.getElementById('bg-layer');
        const logoLayer = document.getElementById('logo-layer');

        // SVG Renklendirme Filtresi
        function applySvgColor(svgDoc, colorHex) {
            if (!svgDoc) return;
            
            let defs = svgDoc.querySelector('defs');
            if (!defs) {
                defs = svgDoc.createElementNS("http://www.w3.org/2000/svg", "defs");
                svgDoc.documentElement.prepend(defs);
            }
            
            let filter = defs.querySelector('#dynamic-recolor');
            if (filter) filter.remove();
            
            filter = svgDoc.createElementNS("http://www.w3.org/2000/svg", "filter");
            filter.setAttribute('id', 'dynamic-recolor');
            
            const r = parseInt(colorHex.slice(1, 3), 16) / 255;
            const g = parseInt(colorHex.slice(3, 5), 16) / 255;
            const b = parseInt(colorHex.slice(5, 7), 16) / 255;
            
            const feColorMatrix = svgDoc.createElementNS("http://www.w3.org/2000/svg", "feColorMatrix");
            feColorMatrix.setAttribute('type', 'matrix');
            feColorMatrix.setAttribute('values', `
                0 0 0 0 ${r}
                0 0 0 0 ${g}
                0 0 0 0 ${b}
                0 0 0 1 0
            `);
            
            filter.appendChild(feColorMatrix);
            defs.appendChild(filter);
            
            const elements = svgDoc.querySelectorAll('path, polygon, circle, rect, ellipse, g, image');
            elements.forEach(el => {
                el.style.filter = "url(#dynamic-recolor)";
            });
        }

        function updateColors() {
            previewWrapper.style.backgroundColor = bgColorInput.value;
            try { applySvgColor(bgLayer.getSVGDocument(), motifColorInput.value); } catch(e) {}
            try { applySvgColor(logoLayer.getSVGDocument(), fgColorInput.value); } catch(e) {}
        }

        bgColorInput.addEventListener('input', updateColors);
        motifColorInput.addEventListener('input', updateColors);
        fgColorInput.addEventListener('input', updateColors);
        bgLayer.addEventListener('load', updateColors);
        logoLayer.addEventListener('load', updateColors);
        window.addEventListener('DOMContentLoaded', updateColors);

        // 2160x3840 UHD NET ÇIKTI SİSTEMİ
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const canvas = document.getElementById('download-canvas');
            const ctx = canvas.getContext('2d');
            
            // 1. 4K Arka planı boya
            ctx.fillStyle = bgColorInput.value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const bgSvgString = new XMLSerializer().serializeToString(bgLayer.getSVGDocument().documentElement);
            const logoSvgString = new XMLSerializer().serializeToString(logoLayer.getSVGDocument().documentElement);

            const bgImg = new Image();
            const logoImg = new Image();

            // 2. Önce motifi alta çiziyoruz
            bgImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(bgSvgString);
            bgImg.onload = function() {
                ctx.globalAlpha = 0.65;
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1.0;

                // 3. LOGOYU MOTİFİN ÜZERİNE ÇİZİYORUZ
                logoImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(logoSvgString);
                logoImg.onload = function() {
                    const logoGenislik = canvas.width * 0.85;
                    const logoYukseklik = (logoImg.height / logoImg.width) * logoGenislik;
                    const x = (canvas.width - logoGenislik) / 2;
                    const y = (canvas.height - logoYukseklik) / 2;
                    
                    ctx.drawImage(logoImg, x, y, logoGenislik, logoYukseklik);

                    // 4. İndirmeyi başlat
                    const link = document.createElement('a');
                    link.download = 'rizespor-bozkurt-4k-duvarkagidi.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                };
            };
        });
    </script>
</body>
</html>
