<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rizespor Duvar Kağıdı Tasarımcısı</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; }
        .controls { margin: 20px; }
        .control-group { margin: 10px; display: inline-block; }
        
        /* Önizleme Alanı (Telefon ekranı oranında, örn: 9:16) */
        #preview-container {
            width: 360px;
            height: 640px;
            margin: 0 auto;
            position: relative;
            border: 2px solid #555;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            /* Buraya arka plan deseni CSS ile de bağlanabilir */
        }
        
        #logo-svg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
        }
    </style>
</head>
<body>

    <h1>Tasarımını Özelleştir</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>Arka Plan Rengi: </label>
            <input type="color" id="bgColor" value="#1d2363">
        </div>
        <div class="control-group">
            <label>Motif & Logo Rengi: </label>
            <input type="color" id="fgColor" value="#ffffff">
        </div>
        <br><br>
        <button id="downloadBtn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Görseli İndir</button>
    </div>

    <!-- Önizleme Ekranı -->
    <div id="preview-container">
        <!-- Buraya arka plandaki Türk motifinin SVG kodunu gömeceksin -->
        
        <!-- Örnek Logo/Bozkurt Alanı (SVG olarak) -->
        <svg id="logo-svg" viewBox="0 0 100 100">
            <!-- Vektör çizim yolları (path) buraya gelecek -->
            <circle cx="50" cy="50" r="40" class="dynamic-fill" />
        </svg>
    </div>

    <script>
        const bgColorInput = document.getElementById('bgColor');
        const fgColorInput = document.getElementById('fgColor');
        const previewContainer = document.getElementById('preview-container');
        
        // Renk değişimlerini anlık yansıtma
        bgColorInput.addEventListener('input', (e) => {
            previewContainer.style.backgroundColor = e.target.value;
        });

        fgColorInput.addEventListener('input', (e) => {
            // SVG içindeki "dynamic-fill" sınıfına sahip tüm ögelerin rengini değiştirir
            const elements = document.querySelectorAll('.dynamic-fill');
            elements.forEach(el => el.style.fill = e.target.value);
        });

        // İndirme fonksiyonu (HTML5 Canvas kullanarak resmi render eder)
        document.getElementById('downloadBtn').addEventListener('click', () => {
            // Burada Canvas elementine preview-container'ın içeriği çizilip
            // canvas.toDataURL("image/png") ile indirme linki tetiklenir.
            alert('İndirme sistemi tetiklendi! (Canvas entegrasyonu gerekir)');
        });
    </script>
</body>
</html>
